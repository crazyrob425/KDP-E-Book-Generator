name: Release Desktop App

# Triggers when a version tag is pushed: git tag v2.1.0 && git push origin v2.1.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-tauri:
    name: Build & Release Tauri (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare NSIS branding assets
        run: npm run brand:nsis

      - name: Generate release update scaffold
        run: npm run release:scaffold-update

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Linux system deps ─────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Build ─────────────────────────────────────────────────────────────
      # Guardrail: print available npm scripts so mismatches are visible in logs
      - name: List available npm scripts
        run: npm run

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "KDP E-Book Generator ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See the [CHANGELOG](https://github.com/crazyrob425/KDP-E-Book-Generator/blob/main/CHANGELOG.md) for details.

            ## Download
            Choose the installer for your OS below:
            - **Windows:** `.msi` or `.exe` (NSIS)
            - **macOS (Apple Silicon):** `.dmg` (aarch64)
            - **macOS (Intel):** `.dmg` (x86_64)
            - **Linux:** `.AppImage` or `.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          npmScriptName: "tauri:build"
