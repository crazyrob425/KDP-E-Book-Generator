name: AI Suggestion Autopilot

on:
  pull_request_review_comment:
    types: [created, edited]
  issue_comment:
    types: [created, edited]

jobs:
  apply-ai-suggestions:
    if: |
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request) &&
      (github.event.comment.user.login == 'LlamaPReview' || github.event.comment.user.login == 'github-copilot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      MAX_MINOR_CHANGE_LINES: "5"
      MANUAL_REVIEW_MENTION: "@crazyrob425"

    steps:
      - name: Resolve PR context
        id: pr_context
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const comment = context.payload.comment;

            let pr;
            if (eventName === "issue_comment") {
              if (!context.payload.issue?.pull_request) {
                core.setOutput("skip", "true");
                return;
              }
              const prResp = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: context.payload.issue.number
              });
              pr = prResp.data;
            } else {
              pr = context.payload.pull_request;
            }

            core.setOutput("skip", "false");
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("head_repo", pr.head.repo.full_name);
            core.setOutput("can_push", String(pr.head.repo.full_name === `${owner}/${repo}`));
            core.setOutput("comment_login", comment.user.login);

      - name: Checkout PR branch
        if: steps.pr_context.outputs.skip == 'false' && github.event_name == 'pull_request_review_comment'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_context.outputs.head_ref }}
          fetch-depth: 0

      - name: Parse, classify, and handle AI suggestion
        if: steps.pr_context.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
          CAN_PUSH: ${{ steps.pr_context.outputs.can_push }}
          COMMENT_LOGIN: ${{ steps.pr_context.outputs.comment_login }}
          MAX_MINOR_CHANGE_LINES: ${{ env.MAX_MINOR_CHANGE_LINES }}
          MANUAL_REVIEW_MENTION: ${{ env.MANUAL_REVIEW_MENTION }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const cp = require("child_process");
            const { owner, repo } = context.repo;
            const eventName = context.eventName;
            const payload = context.payload;
            const comment = payload.comment;
            const body = comment?.body || "";
            const canPush = process.env.CAN_PUSH === "true";
            const prNumber = Number(process.env.PR_NUMBER);
            const actorLogin = process.env.COMMENT_LOGIN;
            const MAX_MINOR_CHANGE_LINES = Number(process.env.MAX_MINOR_CHANGE_LINES || "5");
            const MANUAL_REVIEW_MENTION = process.env.MANUAL_REVIEW_MENTION || "@crazyrob425";

            const codeBlockRegex = /```([^\n`]*)\n([\s\S]*?)```/g;
            const codeBlocks = [];
            let match;
            while ((match = codeBlockRegex.exec(body)) !== null) {
              codeBlocks.push({
                info: (match[1] || "").trim(),
                content: (match[2] || "").replace(/\n$/, "")
              });
            }

            const reviewPath = payload.comment?.path || null;
            const reviewStartLine = payload.comment?.start_line || payload.comment?.line || null;
            const reviewEndLine = payload.comment?.line || payload.comment?.start_line || null;
            const reviewSide = payload.comment?.side || null;

            const parseInfo = (info) => {
              const result = {};
              if (!info) return result;
              const pathMatch = info.match(/(?:^|\s)path=([^\s]+)/i);
              const startMatch = info.match(/(?:^|\s)(?:start|line_start)=([0-9]+)/i);
              const endMatch = info.match(/(?:^|\s)(?:end|line_end)=([0-9]+)/i);
              if (pathMatch) result.path = pathMatch[1];
              if (startMatch) result.start = Number(startMatch[1]);
              if (endMatch) result.end = Number(endMatch[1]);
              return result;
            };

            const suggestions = codeBlocks.map((block) => {
              const meta = parseInfo(block.info);
              const start = meta.start ?? reviewStartLine;
              const end = meta.end ?? reviewEndLine ?? start;
              const suggestionPath = meta.path ?? reviewPath;
              const replacementLines = block.content.length === 0 ? 0 : block.content.split("\n").length;
              const originalSpan = start && end ? Math.abs(end - start) + 1 : 0;
              const changedLines = Math.max(replacementLines, originalSpan);
              return {
                info: block.info,
                path: suggestionPath,
                start,
                end,
                side: reviewSide,
                replacement: block.content,
                replacementLines,
                changedLines
              };
            }).filter((s) => s.replacement !== undefined);

            const dependencyManifests = new Set([
              "package.json",
              "package-lock.json",
              "yarn.lock",
              "pnpm-lock.yaml",
              "src-tauri/Cargo.toml",
              "src-tauri/Cargo.lock"
            ]);

            const isCommentLikeLine = (line) => {
              const trimmed = line.trim();
              return (
                trimmed === "" ||
                trimmed.startsWith("//") ||
                trimmed.startsWith("/*") ||
                trimmed.startsWith("*") ||
                trimmed.startsWith("<!--") ||
                trimmed.startsWith("#")
              );
            };

            const safeRead = (filePath) => {
              try {
                return fs.readFileSync(filePath, "utf8");
              } catch {
                return null;
              }
            };

            const reasons = [];
            let totalChangedLines = 0;
            let allMinorSafe = true;

            if (suggestions.length === 0) {
              reasons.push("No Markdown code blocks were found in the comment.");
              allMinorSafe = false;
            }
            if (eventName === "issue_comment") {
              reasons.push("Issue comment suggestions require manual review path for safe execution.");
              allMinorSafe = false;
            }

            for (const suggestion of suggestions) {
              totalChangedLines += suggestion.changedLines;
              if (!suggestion.path || !suggestion.start || !suggestion.end) {
                reasons.push("Suggestion is missing file path or line context.");
                allMinorSafe = false;
                continue;
              }
              if (suggestion.side && suggestion.side !== "RIGHT") {
                reasons.push("Suggestion is not on the current-side diff.");
                allMinorSafe = false;
              }
              if (suggestion.path === "src-tauri/src/main.rs") {
                reasons.push("Touches src-tauri/src/main.rs.");
                allMinorSafe = false;
              }
              if (dependencyManifests.has(suggestion.path)) {
                reasons.push("Touches dependency manifest/lock file.");
                allMinorSafe = false;
              }
              if (suggestion.path.startsWith("server/")) {
                const routePattern = /\b(app|router)\.(get|post|put|patch|delete)\s*\(|express\.Router\s*\(|\/api\//i;
                if (routePattern.test(suggestion.replacement)) {
                  reasons.push("Likely API route update inside server/.");
                  allMinorSafe = false;
                }
              }
              if (suggestion.changedLines > MAX_MINOR_CHANGE_LINES) {
                reasons.push(`Suggestion in ${suggestion.path} changes more than ${MAX_MINOR_CHANGE_LINES} lines.`);
                allMinorSafe = false;
              }
            }

            if (totalChangedLines > MAX_MINOR_CHANGE_LINES) {
              reasons.push(`Total changed lines across suggestions exceeds ${MAX_MINOR_CHANGE_LINES}.`);
              allMinorSafe = false;
            }
            if (!canPush) {
              reasons.push("PR head branch is in a fork; workflow token cannot push safely.");
              allMinorSafe = false;
            }

            const replacements = [];
            if (allMinorSafe) {
              for (const suggestion of suggestions) {
                const absPath = path.join(process.cwd(), suggestion.path);
                const original = safeRead(absPath);
                if (original === null) {
                  reasons.push(`Unable to read file: ${suggestion.path}`);
                  allMinorSafe = false;
                  break;
                }
                const lines = original.split(/\r?\n/);
                const startIdx = suggestion.start - 1;
                const endIdx = suggestion.end - 1;
                if (startIdx < 0 || endIdx >= lines.length || startIdx > endIdx) {
                  reasons.push(`Invalid line range for ${suggestion.path}: ${suggestion.start}-${suggestion.end}`);
                  allMinorSafe = false;
                  break;
                }

                const oldSegment = lines.slice(startIdx, endIdx + 1).join("\n");
                const newSegment = suggestion.replacement;
                const normalizedOld = oldSegment.replace(/\s+/g, "");
                const normalizedNew = newSegment.replace(/\s+/g, "");
                const oldAllComment = oldSegment.split("\n").every(isCommentLikeLine);
                const newAllComment = newSegment.split("\n").every(isCommentLikeLine);

                const minorByNature =
                  normalizedOld === normalizedNew || // formatting/lint only
                  (oldAllComment && newAllComment) || // comment-only
                  suggestion.changedLines < MAX_MINOR_CHANGE_LINES; // tiny non-core patch

                if (!minorByNature) {
                  reasons.push(`Change in ${suggestion.path} is not confidently minor.`);
                  allMinorSafe = false;
                  break;
                }

                lines.splice(startIdx, endIdx - startIdx + 1, ...newSegment.split("\n"));
                replacements.push({ path: absPath, content: lines.join("\n") });
              }
            }

            const significantMsg = `⚠️ Significant update detected from ${actorLogin}. ${MANUAL_REVIEW_MENTION}, please review this logic manually.`;

            if (!allMinorSafe) {
              if (eventName === "pull_request_review_comment") {
                await github.rest.pulls.createReplyForReviewComment({
                  owner,
                  repo,
                  pull_number: prNumber,
                  comment_id: comment.id,
                  body: significantMsg
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: significantMsg
                });
              }
              core.info(`Marked as significant/manual. Reasons: ${Array.from(new Set(reasons)).join(" | ")}`);
              return;
            }

            for (const replacement of replacements) {
              fs.writeFileSync(replacement.path, replacement.content, "utf8");
            }

            cp.execSync("git config user.name \"github-actions[bot]\"");
            cp.execSync("git config user.email \"github-actions[bot]@users.noreply.github.com\"");
            const status = cp.execSync("git status --porcelain").toString().trim();
            if (!status) {
              core.info("No file changes detected after applying suggestions.");
              return;
            }
            cp.execSync("git add .");
            cp.execSync(`git commit -m "chore: auto-apply AI suggestion from ${actorLogin}"`);
            cp.execSync("git push");
            core.info(`Auto-applied minor suggestion(s) from ${actorLogin}.`);
